spring.application.name=gateway-service

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=finding-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://FINDING-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/findings/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1